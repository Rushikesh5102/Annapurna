    <div class="checkout-container">
        <!-- Order Summary -->
        <div class="order-summary">
            <h2>Order Summary</h2>
            <ul id="cart-items">
                <!-- Dynamically added cart items -->
                <li><span>Item Name</span><span>₹100</span></li>
                <li><span>Another Item</span><span>₹200</span></li>
                <li class="total"><span>Total</span><span>₹300</span></li>
            </ul>
        </div>

        <!-- Checkout Form -->
        <div class="checkout-form">
            <h2>Billing Details</h2>
            <form id="checkout-form">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

                <label for="address">Address</label>
                <textarea id="address" name="address" rows="4" placeholder="Enter your address" required></textarea>

                <label for="payment">Payment Method</label>
                <select id="payment" name="payment" required>
                    <option value="credit-card">Credit Card</option>
                    <option value="debit-card">Debit Card</option>
                    <option value="net-banking">Net Banking</option>
                    <option value="cash-on-delivery">Cash on Delivery</option>
                </select>

                <button id="checkout-button">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Footer Section -->

    <script>
        // Function to load and display cart items on the checkout page
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            const cartItemsElement = document.getElementById("cart-items");

            if (cart.length === 0) {
                cartItemsElement.innerHTML = "<li>Your cart is empty.</li>";
                return;
            }

            let total = 0;
            cartItemsElement.innerHTML = cart
                .map((item) => {
                    total += item.price;
                    return `<li><span>${item.name}</span><span>₹${item.price}</span></li>`;
                })
                .join("");

            cartItemsElement.innerHTML += `<li class="total"><span>Total</span><span>₹${total}</span></li>`;
        }

        // Clear the cart after placing an order
        function clearCart() {
            localStorage.removeItem("cart");
            alert("Thank you for your order!");
            location.reload();
        }

        document.getElementById("checkout-button").addEventListener("click", (e) => {
            const form = document.getElementById("checkout-form");
            if (form.checkValidity()) {
                e.preventDefault();
                clearCart();
            }
        });

        document.addEventListener("DOMContentLoaded", loadCart);
    </script>
    <script src="../Assets/js/scripts.js"></script>
    <script src="../Assets/js/Spices-Checkout.js"></script>

    <script>
        // Hamburger menu toggle
        (function() {
            var btn = document.getElementById('hamburger-btn');
            var nav = document.querySelector('header nav');
            var overlay = document.getElementById('nav-overlay');
            if (!btn || !nav || !overlay) return;

            function openMenu() {
                btn.classList.add('open');
                nav.classList.add('open');
                overlay.classList.add('open');
                btn.setAttribute('aria-expanded', 'true');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                btn.classList.remove('open');
                nav.classList.remove('open');
                overlay.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
                document.body.style.overflow = '';
            }

            btn.addEventListener('click', function() {
                if (nav.classList.contains('open')) closeMenu(); else openMenu();
            });
            overlay.addEventListener('click', closeMenu);
            // Close on nav link click (mobile)
            nav.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', closeMenu);
            });
            // Close on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeMenu();
            });
        })();
    </script>
</body>
