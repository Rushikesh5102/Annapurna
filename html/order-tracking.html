    <div class="form-container" style="flex: 1;">
        <h2>Order Tracking</h2>
        <p style="text-align: center; margin-bottom: 20px; color: var(--text-muted);">Enter your Order ID below to check the status of your order.</p>

        <form id="track-order-form">

    <script>
        const trackOrderBtn = document.getElementById('track-order-btn');
        const orderStatus = document.getElementById('order-status');
        const statusMessage = document.getElementById('status-message');

        trackOrderBtn.addEventListener('click', () => {
            const orderId = document.getElementById('order-id').value.trim();
            if (orderId) {
                orderStatus.style.display = 'block';
                statusMessage.textContent = 'Fetching details...';
                
                setTimeout(() => {
                    const dummyStatuses = {
                        '12345': 'Your order has been shipped and is in transit!',
                        '67890': 'Your order is currently being prepared by the Chef.',
                        '11223': 'Your order has been successfully delivered. Enjoy your meal!',
                    };
                    const status = dummyStatuses[orderId] || 'Order ID not found. Please double-check and try again.';
                    statusMessage.textContent = status;
                }, 800);
            } else {
                alert('Please enter a valid Order ID.');
            }
        });
    </script>
    <script src="../Assets/js/scripts.js"></script>

    <script>
        // Hamburger menu toggle
        (function() {
            var btn = document.getElementById('hamburger-btn');
            var nav = document.querySelector('header nav');
            var overlay = document.getElementById('nav-overlay');
            if (!btn || !nav || !overlay) return;

            function openMenu() {
                btn.classList.add('open');
                nav.classList.add('open');
                overlay.classList.add('open');
                btn.setAttribute('aria-expanded', 'true');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                btn.classList.remove('open');
                nav.classList.remove('open');
                overlay.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
                document.body.style.overflow = '';
            }

            btn.addEventListener('click', function() {
                if (nav.classList.contains('open')) closeMenu(); else openMenu();
            });
            overlay.addEventListener('click', closeMenu);
            // Close on nav link click (mobile)
            nav.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', closeMenu);
            });
            // Close on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeMenu();
            });
        })();
    </script>
