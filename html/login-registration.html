                    </div>

                    <div style="margin-bottom: 26px; display: flex; align-items: center; gap: 9px;">

                            flex-shrink: 0;

                    <div style="margin-bottom: 16px;">

                            letter-spacing: 0.6px;
                            margin-bottom: 7px;
                            font-family: 'Outfit', sans-serif;
                            text-transform: uppercase;

                        <input id="regPassword" type="password" data-type="password" style="
                            width: 100%;
                            box-sizing: border-box;
                            background: rgba(0,0,0,0.35);
                            border: 1px solid rgba(255,255,255,0.10);
                            border-radius: 10px;
                            padding: 12px 16px;
                            color: #fff;
                            font-family: 'Poppins', sans-serif;
                            font-size: 14px;
                            outline: none;

                        <div id="regPasswordError" style="color: #ff9f43; font-size: 11px; margin-top: 5px;"></div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label style="
                            display: block;
                            color: rgba(244,235,217,0.85);
                            font-size: 12px;
                            font-weight: 600;
                            letter-spacing: 0.6px;
                            margin-bottom: 7px;
                            font-family: 'Outfit', sans-serif;
                            text-transform: uppercase;
                        ">Confirm Password</label>

    <script>
        // ---- Tab switching ----
        const tab1 = document.getElementById('tab-1');
        const tab2 = document.getElementById('tab-2');
        const labelSignin = document.getElementById('label-signin');
        const labelSignup = document.getElementById('label-signup');
        const signInPanel = document.getElementById('sign-in-panel');
        const signUpPanel = document.getElementById('sign-up-panel');

        function updateTabs() {
            if (tab1.checked) {
                signInPanel.style.display = 'block';
                signUpPanel.style.display = 'none';
                labelSignin.style.color = '#d2691e';
                labelSignin.style.borderBottom = '2px solid #d2691e';
                labelSignup.style.color = 'rgba(244,235,217,0.7)';
                labelSignup.style.borderBottom = '2px solid transparent';
            } else {
                signInPanel.style.display = 'none';
                signUpPanel.style.display = 'block';
                labelSignup.style.color = '#d2691e';
                labelSignup.style.borderBottom = '2px solid #d2691e';
                labelSignin.style.color = 'rgba(244,235,217,0.7)';
                labelSignin.style.borderBottom = '2px solid transparent';
            }
        }
        tab1.addEventListener('change', updateTabs);
        tab2.addEventListener('change', updateTabs);

        // ---- Validation helpers ----
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).toLowerCase());
        }

        function showPopup(message, type) {
            const el = document.createElement('div');
            el.textContent = message;
            Object.assign(el.style, {
                position: 'fixed', top: '20px', right: '20px',
                padding: '12px 24px', borderRadius: '8px', color: '#fff',
                zIndex: '9999', fontFamily: 'Poppins, sans-serif', fontSize: '14px',
                boxShadow: '0 4px 15px rgba(0,0,0,0.2)', transition: 'opacity 0.4s ease',
                background: type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8'
            });
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
        }

        // ---- Sign In ----
        document.getElementById('signInButton').addEventListener('click', function () {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            let valid = true;
            if (!validateEmail(email)) {
                document.getElementById('emailError').textContent = 'Invalid email format';
                showPopup('Invalid email format', 'error'); valid = false;
            }
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                showPopup('Password must be at least 6 characters', 'error'); valid = false;
            }
            if (valid) {
                const creds = { 'rushikesh.pattiwar@adypu.edu.in': 'Rushikesh@10' };
                if (creds[email] && creds[email] === password) showPopup('Welcome Owner!', 'success');
                else showPopup('User not found or incorrect password', 'error');
            }
        });

        // ---- Sign Up ----
        document.getElementById('signUpButton').addEventListener('click', function () {
            const regEmail = document.getElementById('regEmail').value.trim();
            const regPassword = document.getElementById('regPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            document.getElementById('regEmailError').textContent = '';
            document.getElementById('regPasswordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
            let valid = true;
            if (!validateEmail(regEmail)) {
                document.getElementById('regEmailError').textContent = 'Invalid email format';
                showPopup('Invalid email format', 'error'); valid = false;
            }
            if (regPassword.length < 6) {
                document.getElementById('regPasswordError').textContent = 'Password must be at least 6 characters';
                showPopup('Password too short', 'error'); valid = false;
            }
            if (regPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                showPopup('Passwords do not match', 'error'); valid = false;
            }
            if (valid) showPopup('Sign Up successful!', 'success');
        });
    </script>
    <script src="../Assets/js/scripts.js"></script>

    <script>
        // Hamburger menu toggle
        (function() {
            var btn = document.getElementById('hamburger-btn');
            var nav = document.querySelector('header nav');
            var overlay = document.getElementById('nav-overlay');
            if (!btn || !nav || !overlay) return;

            function openMenu() {
                btn.classList.add('open');
                nav.classList.add('open');
                overlay.classList.add('open');
                btn.setAttribute('aria-expanded', 'true');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                btn.classList.remove('open');
                nav.classList.remove('open');
                overlay.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
                document.body.style.overflow = '';
            }

            btn.addEventListener('click', function() {
                if (nav.classList.contains('open')) closeMenu(); else openMenu();
            });
            overlay.addEventListener('click', closeMenu);
            // Close on nav link click (mobile)
            nav.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', closeMenu);
            });
            // Close on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeMenu();
            });
        })();
    </script>
